<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insetologia | O Mundo dos Insetos</title>
    <style>
        :root {
            --primary: #2c6e49; /* Verde folha escuro */
            --primary-light: #4c956c; /* Verde claro */
            --accent: #fefee3; /* Creme claro */
            --amber: #f39c12; /* Tom de mel/âmbar */
            --dark: #1e2d24; /* Fundo escuro botânico */
            --light: #f9fbf9; /* Fundo geral */
            --text: #2b3a30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        /* Barra de Navegação */
        nav {
            background-color: var(--dark);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary-light);
        }

        nav .logo {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        nav a {
            color: #d1dbd4;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--amber);
        }

        /* Hero Header */
        header {
            background: linear-gradient(rgba(30, 45, 36, 0.85), rgba(44, 110, 73, 0.85)), 
                        url('https://images.unsplash.com/photo-1576014131795-d440191a8e8b?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            color: white;
            padding: 6rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            letter-spacing: 3px;
            color: var(--accent);
        }
